name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release-native:
    name: Release Native Image
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ais-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "25"
          distribution: "graalvm"
          components: "native-image"
          cache: gradle

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Yarn
        run: npm install -g yarn

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgif-dev zlib1g-dev libssl-dev

      - name: Build Native Image
        run: ./gradlew nativeCompile

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ais-api/build/native/nativeCompile/ais
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-jar:
    name: Release JAR
    runs-on: ubuntu-latest
    needs: release-native
    defaults:
      run:
        working-directory: ais-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: gradle

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Yarn
        run: npm install -g yarn

      - name: Build Frontend
        run: yarn --cwd ../ais-web install --frozen-lockfile

      - name: Build JAR
        run: ./gradlew bootJar

      - name: Upload JAR to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ais-api/build/libs/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
